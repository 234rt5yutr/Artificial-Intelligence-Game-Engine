plan_id: gpu-skinning
objective: |
  Implement GPU skinning for skeletal meshes via compute shaders and/or vertex shader SSBOs.
  Upload bone matrices from SkeletonPose::SkinningMatrices to GPU, deform skinned vertices,
  create skinned PBR shader variants, and add a SkeletalRenderSystem for skeletal mesh rendering.
created_at: "2025-01-04T12:53:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 8
  risk_score: medium

tldr: |
  GPU skinning implementation in 5 waves:
  1. Core infrastructure: bone matrix buffer management + skinning compute shader
  2. Vertex shader variant: skinned_pbr.vert with SSBO bone access
  3. ECS integration: SkeletalRenderSystem to update poses and collect draw commands
  4. Integration: Connect animation system output to GPU skinning pipeline
  5. Testing & optimization: Validate correctness, profile performance, add LOD support

  Two skinning approaches provided:
  - Compute shader (skinning.comp): Pre-transforms vertices into output buffer, suitable for reuse across shadow/main passes
  - Vertex shader SSBO (skinned_pbr.vert): On-the-fly skinning during vertex stage, simpler but transforms per-pass

  Recommended: Start with vertex shader SSBO approach (simpler), add compute path for multi-pass optimization later.

open_questions:
  - Should compute-skinned vertices be cached for shadow passes or re-computed per pass?
  - Maximum expected bone count per model (256 assumed, matches MAX_BONES constant)?
  - Should dual quaternion skinning be supported for volume preservation?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Bone matrix buffer update race condition with render thread
      likelihood: medium
      impact: high
      mitigation: Use double-buffering for bone matrices, synchronize via frame index
    - scenario: SSBO binding conflicts with existing descriptor sets
      likelihood: medium
      impact: medium
      mitigation: Audit existing descriptor set layouts in FrustumCulling and ForwardPlus, reserve dedicated set for skinning
    - scenario: Skinned vertex data memory explosion for large meshes
      likelihood: low
      impact: medium
      mitigation: Compute path only - use vertex shader SSBO for on-the-fly skinning to avoid output buffer allocation
    - scenario: Animation pose not ready when GPU skinning runs
      likelihood: low
      impact: high
      mitigation: Ensure animation update runs before SkeletalRenderSystem in ECS update order
  assumptions:
    - VMA allocator available for GPU buffer creation (confirmed in VulkanBuffer.cpp)
    - SSBO support available in Vulkan 1.3 target (confirmed in ShaderCompiler.cpp)
    - SkeletonPose::SkinningMatrices is computed correctly by animation system
    - Existing pbr.vert can serve as template for skinned variant
    - RenderSystem pattern can be extended for skeletal meshes

implementation_specification:
  code_structure: |
    GPU skinning follows a layered architecture:
    1. Buffer Layer: BoneMatrixBuffer class manages per-skeleton GPU bone data
    2. Shader Layer: skinning.comp (compute) + skinned_pbr.vert (vertex) for deformation
    3. System Layer: SkeletalRenderSystem orchestrates pose upload and draw command collection
    4. Integration Layer: Hook into existing render pipeline via DrawCommand extension

  affected_areas:
    - Core/Renderer/ (new BoneMatrixBuffer, shader management)
    - Core/ECS/Systems/ (new SkeletalRenderSystem)
    - Core/ECS/Components/SkeletalMeshComponent.h (GPU buffer reference)
    - Shaders/ (new skinning.comp, skinned_pbr.vert, skinned_pbr.frag)
    - Core/RHI/ (potential descriptor set layout additions)

  component_details:
    - component: BoneMatrixBuffer
      responsibility: |
        Manages GPU storage buffer for bone matrices. Handles double-buffering
        for safe CPU->GPU updates while rendering. Tracks dirty state and
        performs uploads only when pose changes.
      interfaces:
        - "void Initialize(RHIDevice*, uint32_t maxBones)"
        - "void UpdateMatrices(const std::vector<Mat4>& skinningMatrices, uint32_t frameIndex)"
        - "RHIBuffer* GetBuffer(uint32_t frameIndex) const"
        - "uint32_t GetBoneCount() const"

    - component: skinning.comp
      responsibility: |
        Compute shader that transforms source vertices using bone matrices.
        Input: source skinned vertices (position, normal, tangent, bone indices/weights).
        Output: transformed vertices ready for rasterization.
        Used when same skinned mesh renders multiple times per frame (shadow + main).
      interfaces:
        - "layout(set=0, binding=0) readonly buffer BoneMatrices"
        - "layout(set=0, binding=1) readonly buffer SourceVertices"
        - "layout(set=0, binding=2) writeonly buffer OutputVertices"

    - component: skinned_pbr.vert
      responsibility: |
        Vertex shader variant with runtime bone matrix skinning via SSBO.
        Extends pbr.vert with bone transform application before MVP multiply.
        Preferred for single-pass rendering (no output buffer needed).
      interfaces:
        - "layout(location=4) in uvec4 inBoneIndices"
        - "layout(location=5) in vec4 inBoneWeights"
        - "layout(set=2, binding=0) readonly buffer BoneMatrices"

    - component: SkeletalRenderSystem
      responsibility: |
        ECS system that processes SkeletalMeshComponent entities.
        1. Updates bone matrix buffers from SkeletonPose::SkinningMatrices
        2. Optionally dispatches compute skinning
        3. Collects SkeletalDrawCommands for renderer
        Follows RenderSystem pattern with parallel processing support.
      interfaces:
        - "void Update(Scene& scene)"
        - "void UpdateParallel(Scene& scene)"
        - "const std::vector<SkeletalDrawCommand>& GetDrawCommands() const"
        - "void SetSkinningMode(SkinningMode mode)"

    - component: SkeletalDrawCommand
      responsibility: |
        Extended draw command structure for skeletal meshes.
        Includes bone buffer reference for shader binding.
      interfaces:
        - "const RHIBuffer* BoneMatrixBuffer"
        - "uint32_t BoneCount"
        - "bool UseComputeSkinning"

  dependencies:
    - component: SkeletalRenderSystem
      relationship: Depends on BoneMatrixBuffer for GPU data management
    - component: SkeletalRenderSystem
      relationship: Reads from SkeletalMeshComponent::CurrentPose
    - component: skinned_pbr.vert
      relationship: Binds BoneMatrixBuffer as SSBO at set 2
    - component: skinning.comp
      relationship: Binds BoneMatrixBuffer and vertex buffers as SSBOs
    - component: BoneMatrixBuffer
      relationship: Uses RHI::RHIDevice for buffer creation

  integration_points:
    - SkeletalRenderSystem registered in Scene alongside RenderSystem
    - Renderer binds BoneMatrixBuffer before drawing skeletal meshes
    - Animation system updates SkeletonPose before SkeletalRenderSystem runs
    - Pipeline state factory creates skinned pipeline variant with extended vertex input

