  - id: skinning-compute-shader
    title: Create skinning.comp compute shader for vertex transformation
    description: |
      Implement compute shader that transforms skinned vertices using bone matrices.

      Shader specification:
      1. Workgroup size: 64 threads (matches frustum_cull.comp pattern)
      2. Input bindings:
         - set=0, binding=0: BoneMatrices (readonly buffer, mat4 array)
         - set=0, binding=1: SourceVertices (readonly buffer, SkinnedVertex array)
         - set=0, binding=2: OutputVertices (writeonly buffer, Vertex array)
      3. Push constants: vertexCount, boneCount

      Skinning algorithm (4-bone linear blend):
      ```glsl
      mat4 skinMatrix = boneMatrices[indices.x] * weights.x
                      + boneMatrices[indices.y] * weights.y
                      + boneMatrices[indices.z] * weights.z
                      + boneMatrices[indices.w] * weights.w;
      vec4 skinnedPos = skinMatrix * vec4(srcVertex.position, 1.0);
      vec3 skinnedNormal = mat3(skinMatrix) * srcVertex.normal;
      vec3 skinnedTangent = mat3(skinMatrix) * srcVertex.tangent.xyz;
      ```

      Reference: frustum_cull.comp for structure patterns and SSBO layouts.

