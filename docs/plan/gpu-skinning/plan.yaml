  - id: bone-buffer-infrastructure
    title: Create BoneMatrixBuffer class for GPU bone data management
    description: |
      Implement BoneMatrixBuffer in Core/Renderer/ to manage per-skeleton GPU storage buffers.

      Requirements:
      1. Create BoneMatrixBuffer.h/.cpp following VulkanBuffer patterns
      2. Support double-buffered storage (frame N-1 renders while frame N uploads)
      3. Use BufferUsage::Storage for SSBO compatibility
      4. Handle variable bone counts up to MAX_BONES (256)
      5. Track dirty state to skip redundant uploads
      6. Align mat4 array for std430 layout (16-byte alignment per vec4)

      Key implementation details:
      - Buffer size: sizeof(Mat4) * maxBones = 64 * 256 = 16KB per buffer
      - Double buffer: 2 buffers, indexed by frameIndex % 2
      - Map/memcpy/unmap pattern from FrustumCulling.cpp lines 403-409

      Reference patterns:
      - FrustumCulling::CreateBuffers() for storage buffer creation
      - VulkanBuffer constructor for VMA allocation

