  - id: skinned-vertex-shader
    title: Create skinned_pbr.vert vertex shader with SSBO bone access
    description: |
      Create vertex shader variant that performs runtime skinning via bone matrix SSBO.

      Requirements:
      1. Extend pbr.vert with additional vertex inputs:
         - location 4: uvec4 inBoneIndices
         - location 5: vec4 inBoneWeights
      2. Add bone matrix SSBO binding at set 2, binding 0
      3. Apply linear blend skinning before model transform
      4. Transform normal/tangent using mat3(skinMatrix)

      Descriptor set layout:
      - Set 0: Camera/transform uniforms (existing)
      - Set 1: Material textures (existing)
      - Set 2: Bone matrices SSBO (new for skinned meshes)

      Skinning code (insert before worldPos calculation):
      ```glsl
      mat4 skinMatrix = boneMatrices[inBoneIndices.x] * inBoneWeights.x
                      + boneMatrices[inBoneIndices.y] * inBoneWeights.y
                      + boneMatrices[inBoneIndices.z] * inBoneWeights.z
                      + boneMatrices[inBoneIndices.w] * inBoneWeights.w;
      vec3 skinnedPosition = (skinMatrix * vec4(inPosition, 1.0)).xyz;
      vec3 skinnedNormal = normalize(mat3(skinMatrix) * inNormal);
      vec3 skinnedTangent = normalize(mat3(skinMatrix) * inTangent);
      ```

      Then use skinnedPosition/Normal/Tangent in place of inPosition/Normal/Tangent.

